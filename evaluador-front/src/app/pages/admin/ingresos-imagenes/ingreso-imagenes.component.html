<div class=" mt-4">
  <h3 class="text-center text-danger">CARGAR FOTOS {{ infoIngreso?.placa }}</h3>

  <div class="row">
    <div class="col-12 col-sm-6 col-lg-3 mb-3" *ngFor="let c of categorias">
      <div class="border border-dark rounded p-2 text-center h-100 d-flex flex-column justify-content-between"
           [class.drag-over]="c.isDragging"
           [class.max-reached]="c.imagenes.length >= c.max"
           (dragover)="onDragOver($event, c)"
           (dragleave)="onDragLeave($event, c)"
           (drop)="onDrop($event, c)">

        <div>
          <i class="fa-solid fa-cloud-arrow-up fa-2x mb-2"></i>

          <div class="mb-2">
            <span class="badge"
                  [ngClass]="c.imagenes.length >= c.max ? 'bg-danger' : 'bg-success'">
              {{ c.imagenes.length }}/{{ c.max }}
            </span>
          </div>

          <p class="mb-1">{{ c.nombre }}</p>
          <small class="text-muted">Máximo: {{ c.max }}</small>

          <input type="file"
                 accept="image/*"
                 [multiple]="c.max > 1"
                 capture="environment"
                 class="form-control mb-2 mt-2"
                 [disabled]="c.imagenes.length >= c.max"
                 (change)="onFileChange($event, c)">

          <div class="drag-drop-zone" *ngIf="c.imagenes.length < c.max">
            <small class="text-muted">
              <i class="fa-solid fa-arrow-up-from-bracket me-1"></i>
              Arrastra imágenes aquí
            </small>
          </div>

          <div class="alert alert-warning p-1 mt-2 mb-2"
               *ngIf="c.imagenes.length >= c.max">
            <small><i class="fa-solid fa-triangle-exclamation me-1"></i> Límite alcanzado</small>
          </div>
        </div>

        <div class="image-grid d-flex flex-wrap justify-content-center gap-2 mt-2">
          <div *ngFor="let img of c.imagenes; let i = index" class="image-container">
            <div class="image-preview position-relative">
              <img [src]="img.url"
                   class="img-thumbnail image-thumb"
                   (click)="abrirModal(img.url)">

              <div class="overlay" (click)="abrirModal(img.url)">
                <i class="fa fa-eye fa-2x text-white"></i>
              </div>
            </div>

            <div class="image-actions d-flex flex-wrap gap-1 justify-content-center">
              <button class="btn btn-sm btn-light" title="Subir en el orden" [disabled]="i === 0" (click)="moverImagen(c, i, 'up')">
                <i class="fa-solid fa-arrow-up"></i>
              </button>
              <button class="btn btn-sm btn-light" title="Bajar en el orden" [disabled]="i === c.imagenes.length - 1" (click)="moverImagen(c, i, 'down')">
                <i class="fa-solid fa-arrow-down"></i>
              </button>
              <button class="btn btn-sm btn-light" title="Girar izquierda" (click)="rotarImagen(c, img, -90)">
                <i class="fa-solid fa-rotate-left"></i>
              </button>
              <button class="btn btn-sm btn-light" title="Girar derecha" (click)="rotarImagen(c, img, 90)">
                <i class="fa-solid fa-rotate-right"></i>
              </button>
              <button class="btn btn-sm btn-danger" title="Eliminar imagen" (click)="eliminarImagen(c, img)">
                <i class="fa-solid fa-trash"></i>
              </button>
            </div>
          </div>

          <div *ngFor="let i of getEmptySlots(c)"
               class="empty-slot border border-dashed rounded d-flex align-items-center justify-content-center"
               >
            <small class="text-muted">Vacío</small>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalImagen" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-body p-0">
        <img [src]="imagenSeleccionada"
             class="w-100"
             style="max-height: 90vh; object-fit: contain;">
      </div>
    </div>
  </div>
</div>
